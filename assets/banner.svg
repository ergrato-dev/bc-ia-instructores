<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260" width="1200" height="260">
  <defs>
    <pattern id="dotgrid" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="260" fill="#0d1117"/>

  <!-- Dot grid texture -->
  <rect width="1200" height="260" fill="url(#dotgrid)"/>

  <!-- Top accent bar -->
  <rect width="1200" height="3" fill="#7B68EE"/>

  <!-- Bottom border -->
  <rect y="258" width="1200" height="2" fill="#161b22"/>

  <!-- === LEFT circuit pattern === -->
  <g stroke="#7B68EE" stroke-opacity="0.22" stroke-width="1" fill="none">
    <line x1="25" y1="75" x2="60" y2="35"/>
    <line x1="25" y1="75" x2="80" y2="125"/>
    <line x1="60" y1="35" x2="120" y2="55"/>
    <line x1="120" y1="55" x2="170" y2="90"/>
    <line x1="80" y1="125" x2="150" y2="155"/>
    <line x1="80" y1="125" x2="40" y2="200"/>
    <line x1="150" y1="155" x2="210" y2="180"/>
    <line x1="170" y1="90" x2="230" y2="115"/>
    <line x1="210" y1="180" x2="230" y2="115"/>
  </g>
  <g fill="#0d1117" stroke="#7B68EE" stroke-width="1.5" stroke-opacity="0.4">
    <circle cx="25" cy="75" r="4"/>
    <circle cx="60" cy="35" r="3"/>
    <circle cx="120" cy="55" r="3.5"/>
    <circle cx="80" cy="125" r="4"/>
    <circle cx="40" cy="200" r="3"/>
    <circle cx="150" cy="155" r="3.5"/>
    <circle cx="170" cy="90" r="3"/>
    <circle cx="210" cy="180" r="4"/>
    <circle cx="230" cy="115" r="4.5"/>
  </g>
  <!-- Accent nodes left -->
  <circle cx="25" cy="75" r="4" fill="#7B68EE" fill-opacity="0.75"/>
  <circle cx="150" cy="155" r="3.5" fill="#7B68EE" fill-opacity="0.5"/>
  <circle cx="230" cy="115" r="4.5" fill="#7B68EE" fill-opacity="0.9"/>

  <!-- === RIGHT circuit pattern (mirrored) === -->
  <g stroke="#7B68EE" stroke-opacity="0.22" stroke-width="1" fill="none">
    <line x1="1175" y1="75" x2="1140" y2="35"/>
    <line x1="1175" y1="75" x2="1120" y2="125"/>
    <line x1="1140" y1="35" x2="1080" y2="55"/>
    <line x1="1080" y1="55" x2="1030" y2="90"/>
    <line x1="1120" y1="125" x2="1050" y2="155"/>
    <line x1="1120" y1="125" x2="1160" y2="200"/>
    <line x1="1050" y1="155" x2="990" y2="180"/>
    <line x1="1030" y1="90" x2="970" y2="115"/>
    <line x1="990" y1="180" x2="970" y2="115"/>
  </g>
  <g fill="#0d1117" stroke="#7B68EE" stroke-width="1.5" stroke-opacity="0.4">
    <circle cx="1175" cy="75" r="4"/>
    <circle cx="1140" cy="35" r="3"/>
    <circle cx="1080" cy="55" r="3.5"/>
    <circle cx="1120" cy="125" r="4"/>
    <circle cx="1160" cy="200" r="3"/>
    <circle cx="1050" cy="155" r="3.5"/>
    <circle cx="1030" cy="90" r="3"/>
    <circle cx="990" cy="180" r="4"/>
    <circle cx="970" cy="115" r="4.5"/>
  </g>
  <!-- Accent nodes right -->
  <circle cx="1175" cy="75" r="4" fill="#7B68EE" fill-opacity="0.75"/>
  <circle cx="1050" cy="155" r="3.5" fill="#7B68EE" fill-opacity="0.5"/>
  <circle cx="970" cy="115" r="4.5" fill="#7B68EE" fill-opacity="0.9"/>

  <!-- === Typography === -->

  <!-- Main title -->
  <text x="600" y="112" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, Arial, sans-serif" font-size="54" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="-1">bc · ia · instructores</text>

  <!-- Accent underline -->
  <rect x="430" y="126" width="340" height="2" fill="#7B68EE" fill-opacity="0.35" rx="1"/>

  <!-- Subtitle -->
  <text x="600" y="160" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, Arial, sans-serif" font-size="17" font-weight="400" fill="#8b949e" text-anchor="middle" letter-spacing="0.3">IA en desarrollo de contenidos de formación</text>

  <!-- Tag -->
  <text x="600" y="192" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, Arial, sans-serif" font-size="12" font-weight="400" fill="#3d444d" text-anchor="middle" letter-spacing="3">ADSO · CGMLTI · SENA BOGOTÁ</text>
</svg>
